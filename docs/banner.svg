<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Caddy UI — A modern web dashboard for Caddy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#0f2a43"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <rect width="1280" height="320" rx="16" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <path d="M0 80 H1280 M0 160 H1280 M0 240 H1280"/>
    <path d="M160 0 V320 M320 0 V320 M480 0 V320 M640 0 V320 M800 0 V320 M960 0 V320 M1120 0 V320"/>
  </g>

  <!-- glow -->
  <circle cx="1060" cy="90" r="120" fill="#22d3ee" opacity="0.25" filter="url(#soft)"/>

  <!-- logo mark: stylized routing nodes -->
  <g transform="translate(96,110)">
    <rect x="-28" y="-28" width="160" height="104" rx="20" fill="#0b1220" opacity="0.55"/>
    <circle cx="6" cy="0" r="13" fill="url(#accent)"/>
    <circle cx="6" cy="48" r="13" fill="#94a3b8"/>
    <circle cx="98" cy="24" r="16" fill="#38bdf8"/>
    <path d="M19 0 C 60 0, 60 24, 82 24" stroke="url(#accent)" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M19 48 C 60 48, 60 24, 82 24" stroke="#94a3b8" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <text x="290" y="150" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="84" font-weight="800" fill="#ffffff" letter-spacing="-1">Caddy UI</text>
  <text x="292" y="200" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="500" fill="#cbd5e1">A modern web dashboard for managing Caddy via the Admin API</text>

  <!-- stack pills -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="22" font-weight="600">
    <g transform="translate(292,236)">
      <rect width="150" height="44" rx="22" fill="#ffffff" opacity="0.08"/>
      <text x="75" y="29" text-anchor="middle" fill="#e2e8f0">Next.js 15</text>
    </g>
    <g transform="translate(456,236)">
      <rect width="138" height="44" rx="22" fill="#ffffff" opacity="0.08"/>
      <text x="69" y="29" text-anchor="middle" fill="#e2e8f0">React 19</text>
    </g>
    <g transform="translate(608,236)">
      <rect width="160" height="44" rx="22" fill="#ffffff" opacity="0.08"/>
      <text x="80" y="29" text-anchor="middle" fill="#e2e8f0">Radix UI</text>
    </g>
    <g transform="translate(782,236)">
      <rect width="190" height="44" rx="22" fill="#ffffff" opacity="0.08"/>
      <text x="95" y="29" text-anchor="middle" fill="#e2e8f0">Tailwind CSS</text>
    </g>
  </g>
</svg>
