<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- dimmed page behind -->
  <rect width="1200" height="720" fill="#ffffff"/>
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#e5e7eb"/>
  <text x="40" y="40" font-size="22" font-weight="800" fill="#0f172a" opacity="0.4">Caddy UI</text>
  <text x="40" y="112" font-size="26" font-weight="700" fill="#0f172a" opacity="0.25">HTTP Servers</text>
  <rect width="1200" height="720" fill="#0f172a" opacity="0.55"/>

  <!-- modal -->
  <g>
    <rect x="320" y="70" width="560" height="560" rx="16" fill="#ffffff"/>
    <!-- close -->
    <text x="846" y="104" font-size="18" fill="#94a3b8">×</text>

    <text x="352" y="112" font-size="19" font-weight="700" fill="#0f172a">Add New HTTP Server</text>
    <text x="352" y="138" font-size="13" fill="#64748b">Configure a new HTTP server with origin or reverse proxy settings.</text>

    <!-- Host Name -->
    <text x="352" y="176" font-size="13" font-weight="500" fill="#0f172a">Host Name</text>
    <rect x="352" y="186" width="496" height="42" rx="8" fill="#ffffff" stroke="#0f172a"/>
    <text x="368" y="212" font-size="14" fill="#94a3b8">dashboard.example.com</text>

    <!-- Handler Type -->
    <text x="352" y="260" font-size="13" font-weight="500" fill="#0f172a">Handler Type</text>
    <rect x="352" y="270" width="496" height="42" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="368" y="296" font-size="14" fill="#0f172a">Reverse Proxy</text>
    <text x="828" y="296" font-size="12" fill="#64748b">⌄</text>

    <!-- tabs -->
    <rect x="352" y="330" width="496" height="38" rx="8" fill="#f1f5f9"/>
    <rect x="356" y="334" width="120" height="30" rx="6" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="416" y="354" font-size="12.5" text-anchor="middle" font-weight="600" fill="#0f172a">Upstreams</text>
    <text x="546" y="354" font-size="12.5" text-anchor="middle" fill="#64748b">Load Balancing</text>
    <text x="676" y="354" font-size="12.5" text-anchor="middle" fill="#64748b">Health Checks</text>
    <text x="800" y="354" font-size="12.5" text-anchor="middle" fill="#64748b">Headers</text>

    <!-- upstream row -->
    <rect x="352" y="384" width="346" height="42" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="368" y="410" font-size="14" fill="#94a3b8">127.0.0.1:3000</text>
    <rect x="708" y="384" width="140" height="42" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="724" y="410" font-size="14" fill="#94a3b8">Max Requests</text>

    <!-- add upstream -->
    <rect x="352" y="440" width="132" height="36" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="418" y="463" font-size="13" text-anchor="middle" fill="#0f172a">+  Add Upstream</text>

    <!-- save -->
    <rect x="352" y="496" width="496" height="44" rx="8" fill="#0f172a"/>
    <text x="600" y="523" font-size="14" text-anchor="middle" fill="#ffffff">Save Configuration</text>
  </g>
</svg>
