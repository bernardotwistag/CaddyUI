    <text x="64" y="232" font-size="14" fill="#64748b">Type: Reverse Proxy</text>
    <text x="64" y="258" font-size="14" fill="#64748b">Origins: 192.168.1.233:8000</text>
    <rect x="64" y="276" width="92" height="24" rx="12" fill="#f1f5f9"/>
    <text x="110" y="292" font-size="12" text-anchor="middle" fill="#475569">round_robin</text>
  </g>
  <g>
    <rect x="420" y="160" width="360" height="150" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="444" y="196" font-size="17" font-weight="700" fill="#0f172a">plex.hexlane.xyz</text>
    <text x="444" y="232" font-size="14" fill="#64748b">Type: Reverse Proxy</text>
    <text x="444" y="258" font-size="14" fill="#64748b">Origins: 192.168.1.177:32400</text>
    <rect x="444" y="276" width="78" height="24" rx="12" fill="#f1f5f9"/>
    <text x="483" y="292" font-size="12" text-anchor="middle" fill="#475569">least_conn</text>
  </g>
  <g>
    <rect x="800" y="160" width="360" height="150" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="824" y="196" font-size="17" font-weight="700" fill="#0f172a">grafana.hexlane.xyz</text>
    <text x="824" y="232" font-size="14" fill="#64748b">Type: Reverse Proxy</text>
    <text x="824" y="258" font-size="14" fill="#64748b">Origins: 192.168.1.177:3001</text>
    <rect x="824" y="276" width="92" height="24" rx="12" fill="#f1f5f9"/>
    <text x="870" y="292" font-size="12" text-anchor="middle" fill="#475569">round_robin</text>
  </g>
  <g>
    <rect x="40" y="330" width="360" height="150" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="64" y="366" font-size="17" font-weight="700" fill="#0f172a">jellyfin.hexlane.xyz</text>
    <text x="64" y="402" font-size="14" fill="#64748b">Type: Reverse Proxy</text>
    <text x="64" y="428" font-size="14" fill="#64748b">Origins: 192.168.1.177:8096</text>
    <rect x="64" y="446" width="78" height="24" rx="12" fill="#f1f5f9"/>
    <text x="103" y="462" font-size="12" text-anchor="middle" fill="#475569">first</text>
  </g>
  <g>
    <rect x="420" y="330" width="360" height="150" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="444" y="366" font-size="17" font-weight="700" fill="#0f172a">homarr.hexlane.xyz</text>
    <text x="444" y="402" font-size="14" fill="#64748b">Type: Reverse Proxy</text>
    <text x="444" y="428" font-size="14" fill="#64748b">Origins: 192.168.1.177:7575</text>
    <rect x="444" y="446" width="92" height="24" rx="12" fill="#f1f5f9"/>
    <text x="490" y="462" font-size="12" text-anchor="middle" fill="#475569">round_robin</text>
  </g>
  <g>
    <rect x="800" y="330" width="360" height="150" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-dasharray="6 6"/>
    <text x="980" y="412" font-size="15" text-anchor="middle" fill="#94a3b8">+  Add another server</text>
  </g>
