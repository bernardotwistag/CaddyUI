<svg width="1200" height="600" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1200" height="600" fill="#ffffff"/>
  <!-- header -->
  <line x1="0" y1="64" x2="1200" y2="64" stroke="#e5e7eb"/>
  <text x="40" y="40" font-size="22" font-weight="800" fill="#0f172a">Caddy UI</text>
  <line x1="150" y1="22" x2="150" y2="42" stroke="#e5e7eb"/>
  <text x="176" y="40" font-size="16" fill="#64748b">Dashboard</text>
  <text x="290" y="40" font-size="16" font-weight="600" fill="#0f172a">HTTP</text>
  <text x="360" y="40" font-size="16" fill="#64748b">Config</text>
  <text x="446" y="40" font-size="16" fill="#64748b">Help</text>
  <rect x="290" y="50" width="42" height="3" rx="1.5" fill="#0f172a"/>

  <!-- title + add button -->
  <text x="40" y="120" font-size="26" font-weight="700" fill="#0f172a">HTTP Servers</text>
  <rect x="1024" y="98" width="136" height="40" rx="8" fill="#0f172a"/>
  <text x="1052" y="123" font-size="14" fill="#ffffff">+  Add Server</text>

  <!-- server cards -->
  <g>
    <rect x="40" y="160" width="360" height="150" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
